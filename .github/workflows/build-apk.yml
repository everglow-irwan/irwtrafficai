name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL deployed Replit app (contoh: https://irwtrafficai.replit.app)"
        required: false
        default: ""

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: |
          set -euo pipefail
          echo "Trying pnpm install with frozen lockfile..."
          if pnpm install --frozen-lockfile; then
            echo "Lockfile is up-to-date."
          else
            echo "Frozen install failed due to lockfile/config mismatch. Running pnpm install --no-frozen-lockfile..."
            pnpm install --no-frozen-lockfile
          fi

      - name: Build web app
        working-directory: artifacts/irw-traffic-ai
        run: pnpm run build
        env:
          PORT: "3000"
          BASE_PATH: "/"
          NODE_ENV: production
          REPLIT_APP_URL: ${{ github.event.inputs.app_url || vars.REPLIT_APP_URL || 'https://irwtrafficai.replit.app' }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: "34.0.0"

      - name: Install Capacitor CLI
        working-directory: artifacts/irw-traffic-ai
        run: npx @capacitor/cli@latest --version

      - name: Initialize Android platform
        working-directory: artifacts/irw-traffic-ai
        run: |
          npx cap add android || true
          npx cap sync android
        env:
          REPLIT_APP_URL: ${{ github.event.inputs.app_url || vars.REPLIT_APP_URL || 'https://irwtrafficai.replit.app' }}

      - name: Set app name & version
        working-directory: artifacts/irw-traffic-ai/android
        run: |
          sed -i 's|app_name">.*<|app_name">IrwTrafficAI<|g' app/src/main/res/values/strings.xml || true
          sed -i 's/versionName "1.0"/versionName "1.0.0"/' app/build.gradle || true

      - name: Make Gradle executable
        working-directory: artifacts/irw-traffic-ai/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/irw-traffic-ai/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IrwTrafficAI-debug-${{ github.run_number }}.apk
          path: artifacts/irw-traffic-ai/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK info
        run: |
          APK_PATH="artifacts/irw-traffic-ai/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK berhasil dibuild: $SIZE"
            echo "📥 Download dari tab Actions → klik workflow run ini → bagian Artifacts"
          else
            echo "❌ APK tidak ditemukan"
            exit 1
          fi
